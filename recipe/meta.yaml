{% set name = "formulaic" %}
{% set version = "1.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: dc79476baa2d811b35798893eb2f2c1e51edee8d7a9c1429b400e56f4e0beccc

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<39]

requirements:
  host:
    - python
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python
    - astor >=0.8
    - cached-property >=1.3.0  # [py<38]
    - graphlib-backport >=1.0.0  # [py<39]
    - interface_meta >=1.2.0
    - numpy >=1.20.0
    - pandas >=1.3
    - scipy >=1.6
    - typing-extensions >=4.2.0
    - wrapt >=1.17.0rc1  # [py>=313]
    - narwhals >=1.17
    - typing_extensions >=4.2.0
  run_constrained:
    - pyarrow >=1
    - sympy >=1.3,!=1.10
    - polars >=1

test:
  imports:
    - formulaic
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/matthewwardrop/formulaic
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A high-performance implementation of Wilkinson formulas for Python.
  description: |
    Formulaic is a high-performance implementation of Wilkinson formulas for Python.
  doc_url: https://matthewwardrop.github.io/formulaic
  dev_url: https://github.com/matthewwardrop/formulaic

extra:
  recipe-maintainers:
    - matthewwardrop
